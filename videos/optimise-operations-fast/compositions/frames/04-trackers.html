      <div id="root" data-composition-id="04-trackers" data-width="1920" data-height="1080" data-duration="5">

        <!-- ===== Single paused timeline, registered at window.__timelines["04-trackers"] ===== -->
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });

          // Total duration: 5.0s (fixed upstream). Build entrance → development → settle.
          // Macro push-in runs underneath the whole beat (slow scale on #root).

          // ── MACRO: slow push-in on root across the whole beat ─────────────
          tl.fromTo(
            "#root",
            { scale: 1.0 },
            {
              scale: 1.035,
              duration: 5.0,
              ease: "sine.inOut",
              transformOrigin: "50% 50%",
            },
            0,
          );

          // Background layers fade in (gentle) alongside the entrance.
          tl.fromTo("#dotGrid", { opacity: 0 }, { opacity: 0.35, duration: 0.8, ease: "sine.out" }, 0);
          tl.fromTo("#tiltDecoA", { opacity: 0, rotation: -16 }, { opacity: 0.10, rotation: -8, duration: 0.9, ease: "power3.out", transformOrigin: "50% 50%" }, 0.05);
          tl.fromTo("#tiltDecoB", { opacity: 0, rotation: 18 }, { opacity: 0.55, rotation: 11, duration: 0.8, ease: "power3.out", transformOrigin: "50% 50%" }, 0.15);

          // ── ENTRANCE (0.0–0.5s) — giant "03" + MEASURE IT label-pill snap in ─
          // spring-pop-entrance default: power3.out smooth settle, no overshoot.
          // Hero subject visible by t≤0.5s.
          tl.fromTo(
            "#giantNum",
            { scale: 0.55, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.55, ease: "power3.out", transformOrigin: "20% 70%" },
            0.05,
          );
          // MEASURE IT label-pill: spring-pop from collapsed, snappy.
          tl.fromTo(
            "#labelPill",
            { scale: 0.4, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.45, ease: "power3.out", transformOrigin: "0% 50%" },
            0.18,
          );
          // Frame tag pill: side-snap from the left, distinct entrance.
          tl.fromTo(
            "#frameTag",
            { x: -50, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.4, ease: "expo.out" },
            0.30,
          );

          // ── DEVELOPMENT (grid-card-assemble — block self-assembles) ────────

          // Phase A (0.55s) — headline lands. Two-line staggered drop.
          tl.fromTo(
            "#line1",
            { y: 50, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
            0.55,
          );
          tl.fromTo(
            "#line2",
            { y: 50, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
            0.72,
          );

          // Phase B (1.25s) — KPI bar trio card seats, then bars grow (stat-bars-and-fills).
          // Card itself springs in first.
          tl.fromTo(
            "#kpiCard",
            { scale: 0.85, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.5, ease: "power3.out", transformOrigin: "100% 50%" },
            1.05,
          );
          // Bars grow UP via scaleY 0→1, staggered. (stat-bars-and-fills signature)
          tl.to("#bar1", { scaleY: 1, duration: 0.55, ease: "power3.out" }, 1.45);
          tl.to("#bar2", { scaleY: 1, duration: 0.55, ease: "power3.out" }, 1.55);
          tl.to("#bar3", { scaleY: 1, duration: 0.65, ease: "power3.out" }, 1.65);
          // Bar labels fade in once bars are mostly grown.
          tl.to("#barLabel1", { opacity: 1, duration: 0.3, ease: "sine.out" }, 1.85);
          tl.to("#barLabel2", { opacity: 1, duration: 0.3, ease: "sine.out" }, 1.95);
          tl.to("#barLabel3", { opacity: 1, duration: 0.3, ease: "sine.out" }, 2.05);
          // Trendline draws (svg-path-draw via stroke-dashoffset), nodes pop in along it.
          tl.to("#trendLine", { strokeDashoffset: 0, duration: 0.7, ease: "power2.out" }, 1.95);
          tl.to("#trendNode1", { opacity: 1, duration: 0.25, ease: "sine.out" }, 2.05);
          tl.to("#trendNode2", { opacity: 1, duration: 0.25, ease: "sine.out" }, 2.30);
          tl.to("#trendNode3", { opacity: 1, duration: 0.25, ease: "sine.out" }, 2.55);

          // Phase C (2.35s) — 3 checkmark rows stagger in (snappy, ≤500ms total).
          // Deterministic index-derived stagger (no Math.random).
          tl.fromTo(
            "#check1",
            { x: -40, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.4, ease: "power3.out" },
            2.35,
          );
          tl.fromTo(
            "#check2",
            { x: -40, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.4, ease: "power3.out" },
            2.50,
          );
          tl.fromTo(
            "#check3",
            { x: -40, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.4, ease: "power3.out" },
            2.65,
          );

          // Phase D (3.10s) — action strip 3 steps connect. Each chip springs in;
          // connector arrows draw in between (svg-path-draw feel via scaleX).
          tl.fromTo(
            "#step1",
            { scale: 0.6, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out", transformOrigin: "50% 50%" },
            3.10,
          );
          tl.fromTo(
            "#arrow1",
            { opacity: 0, scaleX: 0 },
            { opacity: 1, scaleX: 1, duration: 0.25, ease: "power2.out", transformOrigin: "left center" },
            3.40,
          );
          tl.fromTo(
            "#step2",
            { scale: 0.6, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out", transformOrigin: "50% 50%" },
            3.45,
          );
          tl.fromTo(
            "#arrow2",
            { opacity: 0, scaleX: 0 },
            { opacity: 1, scaleX: 1, duration: 0.25, ease: "power2.out", transformOrigin: "left center" },
            3.75,
          );
          tl.fromTo(
            "#step3",
            { scale: 0.6, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.45, ease: "power3.out", transformOrigin: "50% 50%" },
            3.80,
          );

          // ── SETTLE (4.20–5.0s) — tallest KPI bar's trendline runs a bounded
          // sine-wave-loop idle. The ONE live element; everything else holds.
          // Finite onUpdate tween driving sin() into the trendline's vertical
          // bob — amplitude small (low end of range), starts at sin(0)=0 so no
          // jump from the entry's resting state.
          const phase = { p: 0 };
          const IDLE_START = 4.20;
          const IDLE_DUR = 5.0 - IDLE_START;     // 0.80s tail
          const CYCLES = 0.42;                   // finite partial cycle — bounded
          const trendLineEl = document.getElementById("trendLine");
          const trendG = document.getElementById("trendSvg");
          // We bob the whole trendline group (polyline + nodes) slightly so it
          // reads as a "live" trace. Use a wrapper transform on the SVG element.
          tl.to(
            phase,
            {
              p: Math.PI * 2 * CYCLES,
              duration: IDLE_DUR,
              ease: "none",
              onUpdate: () => {
                const s = Math.sin(phase.p);
                // Subtle ±3px translateY on the trendline SVG (jitter amplitude)
                trendG.style.transform = "translateY(" + (s * 3) + "px)";
              },
            },
            IDLE_START,
          );

          // Tiny accent: tallest bar's gold accent breathes ±2% (finite half-breath).
          tl.to(
            "#bar3",
            { scaleY: 0.985, duration: 0.7, ease: "sine.inOut", transformOrigin: "bottom center" },
            IDLE_START,
          );

          window.__timelines["04-trackers"] = tl;

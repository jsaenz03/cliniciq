      <script>
        /* ============================================================
           Frame 6 — 05 · Care Plan Automation  (CLIMAX)
           Blueprint: grid-card-assemble  (Adapt —
                        Base: grid-card-assemble
                        Keep: staggered self-assembly cascade into the item block
                        Depart: focal is a before/after split stat (two tilted
                                cards) rather than a single list)
           Effects:   spring-pop-entrance, counting-dynamic-scale,
                      split-tilt-cards
           Phases:    entrance (~0–0.8s) → development (~0.8–4.2s) →
                      settle (4.2–5.0s). No exit tween.
           Macro:     slow push-in on #stage across the full 5s.
           ============================================================ */
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        /* --- Macro: slow push-in on #stage (steady-push camera) --- */
        tl.fromTo(
          "#stage",
          { scale: 1.00 },
          { scale: 1.06, duration: 5.0, ease: "none" },
          0,
        );

        /* --- ENTRANCE (0.0 – ~0.8s) ---
           "05" numeral + SCALE IT label-pill snap in (spring-pop-entrance,
           power3.out smooth settle). Counter pill + tilted deco also snap in. */
        tl.fromTo(
          "#numeral",
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.7, ease: "power3.out" },
          0.0,
        );
        tl.fromTo(
          "#label-pill",
          { scale: 0, opacity: 0, y: 12 },
          { scale: 1, opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
          0.25,
        );
        tl.fromTo(
          "#counter-pill",
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.5, ease: "power3.out" },
          0.35,
        );
        /* Tilted rect decoration gentle entrance (lands alongside the cascade) */
        tl.fromTo(
          "#tilt-rect",
          { scale: 0, opacity: 0, rotation: 18 },
          { scale: 1, opacity: 1, rotation: 8, duration: 0.7, ease: "power3.out" },
          0.5,
        );

        /* --- DEVELOPMENT (~0.8 – ~4.2s) ---
           Block self-assembles (grid-card-assemble, Adapt):
             1. Before card "30 MIN" slides in from the left, tilted +Y (~0.8s)
                — split-tilt-cards entry (muted, struck-through "before")
             2. Arrow connector draws stroke-by-stroke (svg-path-draw, ~1.3s)
             3. After card "30 SEC" slides in from the right, tilted -Y (~1.5s)
                as the gold payoff — spring-pop-entrance + counting-dynamic-scale
                count-up "0 → 30" with font-size scaling across ~1.5–3.0s
             4. Stat subline "PER CARE PLAN, EVERY VISIT" lands (~2.9s)
             5. 3 checkmark bullets stagger in (~3.0–3.5s, ≤0.5s total)
                with check-icon stroke draw on each
             6. Action strip 3 steps stagger in (~3.5–4.1s) */

        /* 1. BEFORE card — split-tilt-cards entry from left, tilted +Y */
        tl.fromTo(
          "#card-before",
          { x: -160, opacity: 0, rotationY: 14, scale: 0.9 },
          { x: 0, opacity: 1, rotationY: 6, scale: 1, duration: 0.7, ease: "power3.out" },
          0.8,
        );

        /* 2. ARROW — svg-path-draw (line first, head pops after) */
        const arrowLine = document.getElementById("arrow-line");
        const arrowLineLen = arrowLine.getTotalLength();
        arrowLine.style.strokeDasharray = String(arrowLineLen);
        arrowLine.style.strokeDashoffset = String(arrowLineLen);
        tl.to(
          arrowLine,
          { strokeDashoffset: 0, duration: 0.4, ease: "power2.out" },
          1.3,
        );
        tl.fromTo(
          "#arrow-head",
          { scale: 0, opacity: 0, transformOrigin: "84px 40px" },
          { scale: 1, opacity: 1, duration: 0.35, ease: "power3.out" },
          1.55,
        );

        /* 3. AFTER card — split-tilt-cards entry from right, tilted -Y,
              spring-pop-entrance. THE PAYOFF (climax frame). */
        tl.fromTo(
          "#card-after",
          { x: 160, opacity: 0, rotationY: -14, scale: 0.9 },
          { x: 0, opacity: 1, rotationY: -6, scale: 1, duration: 0.7, ease: "power3.out" },
          1.5,
        );

        /* "30" count-up with dynamic font-size — counting-dynamic-scale.
              Proxy state drives BOTH value AND font-size; tabular-nums
              holds digit widths as the number grows. */
        const counter = document.getElementById("after-counter");
        const countState = { value: 0, fontSize: 70 };
        tl.to(
          countState,
          {
            value: 30,
            fontSize: 152,
            duration: 1.4,
            ease: "power3.out",
            onUpdate: () => {
              counter.textContent = String(Math.round(countState.value));
              counter.style.fontSize = countState.fontSize + "px";
            },
          },
          1.6,
        );

        /* 4. Stat subline lands under the focal */
        tl.fromTo(
          "#stat-subline",
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
          2.9,
        );

        /* 5. Three checkmark bullets stagger in (≤0.5s total) */
        const bullets = ["#bullet-1", "#bullet-2", "#bullet-3"];
        bullets.forEach((sel, i) => {
          tl.fromTo(
            sel,
            { opacity: 0, x: -28 },
            { opacity: 1, x: 0, duration: 0.4, ease: "power3.out" },
            3.0 + i * 0.12,
          );
        });
        /* Check-icon stroke draw on each bullet */
        const checks = ["#check-1", "#check-2", "#check-3"];
        checks.forEach((sel, i) => {
          const el = document.querySelector(sel);
          const len = el.getTotalLength();
          el.style.strokeDasharray = String(len);
          el.style.strokeDashoffset = String(len);
          tl.to(
            sel,
            { strokeDashoffset: 0, duration: 0.4, ease: "power2.out" },
            3.1 + i * 0.12,
          );
        });

        /* 6. Action strip 3 connected steps stagger in */
        const steps = ["#step-1", "#step-2", "#step-3"];
        steps.forEach((sel, i) => {
          tl.fromTo(
            sel,
            { opacity: 0, y: 24 },
            { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
            3.5 + i * 0.12,
          );
        });

        /* --- SETTLE (4.2 – 5.0s) ---
           The "30 SEC" focal subject (the gold after card) breathes ±3% —
           a FINITE bounded tween (NOT repeat/-1/yoyo). One live element only.
              Math.sin over a 0.8s window = one breath cycle:
                t=0 → scale 1.0, t=0.4 → 1.03, t=0.8 → 1.0. */
        const breathState = { t: 0 };
        tl.to(
          breathState,
          {
            t: 1,
            duration: 0.8,
            ease: "none",
            onUpdate: () => {
              const s = 1 + 0.03 * Math.sin(breathState.t * Math.PI);
              counter.style.transform = "scale(" + s + ")";
            },
          },
          4.2,
        );

        window.__timelines["06-care-plans"] = tl;
      </script>
    </template>
  </body>
</html>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        // ---- measure SVG paths for stroke-dash draw (BPMN + checkmarks) ----
        // Inline SVG is in the DOM at registration → getTotalLength works.
        const drawPaths = document.querySelectorAll(
          "#node-start, #node-bottleneck, #node-end, #conn-1, #conn-2, " +
          "#check-path-1, #check-path-2, #check-path-3"
        );
        drawPaths.forEach((p) => {
          const len = p.getTotalLength();
          p.style.strokeDasharray = String(len);
          p.style.strokeDashoffset = String(len);
        });

        const tl = gsap.timeline({ paused: true });

        // ====================== MACRO ======================
        // slow push-in across the whole 5s shot (always-on, single source)
        tl.fromTo(
          "#cam",
          { scale: 1.0 },
          { scale: 1.06, duration: 5.0, ease: "none" },
          0
        );

        // ====================== ENTRANCE (0.0 – 0.6s) ======================
        // "02" giant numeral seats top-left — heavy weighted power3 settle
        tl.fromTo(
          "#numeral",
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.55, ease: "power3.out" },
          0.0
        );
        // "MAP IT" label-pill snaps in — snappy spring-pop (power3, no bounce)
        tl.fromTo(
          "#label-pill",
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
          0.15
        );

        // background decoration gentle-arrives
        tl.fromTo(
          "#tilt-rect",
          { scale: 0, opacity: 0, rotation: -18 },
          { scale: 1, opacity: 1, rotation: -7, duration: 0.7, ease: "power3.out" },
          0.05
        );
        tl.fromTo(
          "#dot-grid",
          { opacity: 0 },
          { opacity: 0.06, duration: 0.8, ease: "power1.out" },
          0.05
        );

        // ====================== DEVELOPMENT (0.6 – 3.4s) ======================
        // grid-card-assemble — staggered self-assembly of the item block.

        // (a) headline lands
        tl.fromTo(
          "#headline",
          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" },
          0.6
        );

        // (b) flow-card frame seats
        tl.fromTo(
          "#flow-card",
          { scale: 0.92, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.5, ease: "power3.out" },
          0.75
        );

        // (c) BPMN flow motif draws itself stroke-by-stroke (svg-path-draw).
        // Order: start node → conn1 → bottleneck → conn2 → end node.
        // ~70% overlap → continuous motion; power2.out (pen lifts, no bounce).
        const SEG = 0.55;
        const OVERLAP = 0.18;
        let t = 0.95;
        tl.to("#node-start",
          { strokeDashoffset: 0, duration: SEG, ease: "power2.out" }, t);
        t += OVERLAP;
        tl.to("#conn-1",
          { strokeDashoffset: 0, duration: SEG, ease: "power2.out" }, t);
        t += OVERLAP;
        tl.to("#node-bottleneck",
          { strokeDashoffset: 0, duration: SEG, ease: "power2.out" }, t);
        t += OVERLAP;
        tl.to("#conn-2",
          { strokeDashoffset: 0, duration: SEG, ease: "power2.out" }, t);
        t += OVERLAP;
        tl.to("#node-end",
          { strokeDashoffset: 0, duration: SEG, ease: "power2.out" }, t);

        // (d) bottleneck node blooms gold (ambient-glow-bloom).
        // Land the bloom on the bottleneck stroke's settle (≈ 2.0s).
        const BLOOM_START = 1.85;
        const BLOOM_DUR = 0.6;
        const GLOW_PEAK = 0.42; // ≤ 0.45 cap
        tl.fromTo(
          "#bloom-glow",
          { opacity: 0, scale: 0.7 },
          { opacity: GLOW_PEAK, scale: 1, duration: BLOOM_DUR, ease: "power2.out" },
          BLOOM_START
        );

        // (e) 3 checkmark rows stagger in (snappy, ≤500ms total).
        // Each row seats; its check-mark draws in trailing it.
        // Explicit selectors (no template literals) so the linter resolves each.
        tl.fromTo(
          "#check-1",
          { y: 22, scale: 0.92, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
          2.35
        );
        tl.to(
          "#check-path-1",
          { strokeDashoffset: 0, duration: 0.35, ease: "power2.out" },
          2.53
        );
        tl.fromTo(
          "#check-2",
          { y: 22, scale: 0.92, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
          2.49
        );
        tl.to(
          "#check-path-2",
          { strokeDashoffset: 0, duration: 0.35, ease: "power2.out" },
          2.67
        );
        tl.fromTo(
          "#check-3",
          { y: 22, scale: 0.92, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
          2.63
        );
        tl.to(
          "#check-path-3",
          { strokeDashoffset: 0, duration: 0.35, ease: "power2.out" },
          2.81
        );

        // (f) action strip snaps in as one connected unit
        tl.fromTo(
          "#action-strip",
          { y: 28, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
          2.85
        );

        // star-burst punctures in (decoration)
        tl.fromTo(
          "#star-burst",
          { scale: 0, opacity: 0, rotation: -40 },
          { scale: 1, opacity: 1, rotation: 8, duration: 0.5, ease: "power3.out" },
          3.0
        );

        // ====================== SETTLE (2.45 – 5.0s) ======================
        // The ONE live element — bottleneck glow pulses (bounded sine).
        // Finite onUpdate tween; no repeat / yoyo; sin(0)=0 starts at rest.
        const BREATHE_START = BLOOM_START + BLOOM_DUR; // 2.45s
        const BREATHE_DUR = 5.0 - BREATHE_START;       // 2.55s
        const BREATHE_CYCLES = Math.max(1, Math.floor(BREATHE_DUR / 2.8));
        const OPACITY_AMP = 0.05;
        const SCALE_AMP = 0.02;
        const glowEl = document.getElementById("bloom-glow");
        const phase = { p: 0 };
        tl.to(
          phase,
          {
            p: Math.PI * 2 * BREATHE_CYCLES,
            duration: BREATHE_DUR,
            ease: "none",
            onUpdate: () => {
              const s = Math.sin(phase.p);
              if (glowEl) {
                glowEl.style.opacity = String(GLOW_PEAK + s * OPACITY_AMP);
                glowEl.style.transform = "scale(" + (1 + s * SCALE_AMP) + ")";
              }
            },
          },
          BREATHE_START
        );

        // tilted blue-rect gentle-floats (bounded sine, subtle drift).
        // Finite; background decoration reads with the camera move as one.
        const FLOAT_START = 2.6;
        const FLOAT_DUR = 5.0 - FLOAT_START; // 2.4s
        const tiltEl = document.getElementById("tilt-rect");
        const drift = { t: 0 };
        tl.to(
          drift,
          {
            t: Math.PI * 2 * 1,
            duration: FLOAT_DUR,
            ease: "none",
            onUpdate: () => {
              const s = Math.sin(drift.t);
              // small rotation around the seeded -7° tilt + tiny translate
              tiltEl.style.transform =
                "rotate(" + (-7 + s * 1.8) + "deg) translate(" +
                (s * 4) + "px, " + (s * -3) + "px)";
            },
          },
          FLOAT_START
        );

        window.__timelines["03-bpmn"] = tl;
      </script>
    </template>
  </body>
</html>
